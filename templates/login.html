{% extends "base.html" %}

{% block content %}
<div class="form-page">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header text-center py-3">
                <h4 class="mb-0">Login</h4>
                {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} mt-2">
            {{ message }}
        </div>
      {% endfor %}
    {% endwith %}
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/login">

                    <div class="mb-3">
                        <label class="form-label">Username/Email</label>
                        <input type="text" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select">
                            <option value="student">Student</option>
                            <option value="company">Company</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button class="btn btn-primary w-100">Login</button>
                </form>
                <hr class="my-4">
                <p class="text-center text-muted mb-3">Create a new account</p>
                <div class="d-grid gap-2">
                    <a href="/student/register" class="btn btn-success">Register as Student</a>
                    <a href="/company/register" class="btn btn-success">Register as Company</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
