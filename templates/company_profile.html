{% extends "base.html" %}

{% block content %}

<div class="page-block d-flex justify-content-between align-items-center">
    <h3 class="mb-0">Company Profile</h3>
    <a href="/company/dashboard" class="btn btn-secondary px-4">Back</a>
</div>

<div class="row g-4">

    <!-- Edit Profile -->
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header py-3">
                <h5 class="mb-0">Edit Profile</h5>
            </div>

            <div class="card-body p-4">
                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name"
                               value="{{ company.company_name }}"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">HR Contact</label>
                        <input type="text" name="hr_contact"
                               value="{{ company.hr_contact }}"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Website</label>
                        <input type="text" name="website"
                               value="{{ company.website }}"
                               class="form-control">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Change Password</label>
                        <input type="password" name="password"
                               class="form-control"
                               placeholder="Leave blank to keep current password">
                    </div>

                    <button class="btn btn-primary px-4">Update Profile</button>
                </form>
            </div>
        </div>
    </div>

</div>

{% endblock %}
