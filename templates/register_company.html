{% extends "base.html" %}

{% block content %}
<div class="form-page">
    <div class="col-md-7 col-lg-6">
        <div class="card">
            <div class="card-header py-3">
                <h4 class="mb-0">Company Registration</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Company Name<span class="text-danger">*</span></label>
                        <input type="text" name="company_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">HR Contact<span class="text-danger">*</span></label>
                        <input type="tel" name="hr_contact" class="form-control" placeholder="Enter phone number" pattern="[0-9]{10}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Website<span class="text-danger">*</span></label>
                        <input type="url" name="website" class="form-control" placeholder="https://example.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password<span class="text-danger">*</span></label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button class="btn btn-primary px-4">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
